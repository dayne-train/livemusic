<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root, [data-theme] { transition: background-color 0.3s ease, color 0.3s ease; }
  :root {
    --bg:#1c1c1a; --bg2:#252523; --bg3:#141412;
    --text:#f0f0ec; --text2:#a8a8a2; --text3:#8a8984;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.16);
    --accent:#1D9E75; --accent-dark:#0F6E56;
    --green:#1D9E75; --green-dark:#0F6E56;
    --radius:10px; --radius-sm:6px;
    --hover-tint:rgba(29,158,117,0.06);
    --row-fade-rgb:28,28,26;
    --cover-bg:#2a1f00; --cover-text:#f9a846; --cover-border:#6b4010;
    --solo-text:#93adf8; --solo-border:#5066d4;
    --openmic-text:#e8992a; --openmic-border:#b07316;
    --stale-bg:#2a1f00; --stale-text:#f9a846; --stale-border:#6b4010;
  }
  [data-theme="light"] {
    --bg:#ffffff; --bg2:#f5f5f4; --bg3:#eaeae8;
    --text:#1a1a1a; --text2:#555552; --text3:#888884;
    --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
    --accent:#158a64; --accent-dark:#0e6e50;
    --green:#158a64; --green-dark:#0e6e50;
    --hover-tint:rgba(21,138,100,0.06);
    --row-fade-rgb:255,255,255;
    --cover-bg:#fff3d6; --cover-text:#8a6100; --cover-border:#d4a84a;
    --solo-text:#3451d1; --solo-border:#6378e0;
    --openmic-text:#9a6800; --openmic-border:#c48418;
    --stale-bg:#fff3d6; --stale-text:#8a6100; --stale-border:#d4a84a;
  }
  @media (prefers-color-scheme:light) {
    :root:not([data-theme="dark"]) {
      --bg:#ffffff; --bg2:#f5f5f4; --bg3:#eaeae8;
      --text:#1a1a1a; --text2:#555552; --text3:#888884;
      --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
      --accent:#158a64; --accent-dark:#0e6e50;
      --green:#158a64; --green-dark:#0e6e50;
      --hover-tint:rgba(21,138,100,0.06);
      --row-fade-rgb:255,255,255;
      --cover-bg:#fff3d6; --cover-text:#8a6100; --cover-border:#d4a84a;
      --solo-text:#3451d1; --solo-border:#6378e0;
      --openmic-text:#9a6800; --openmic-border:#c48418;
      --stale-bg:#fff3d6; --stale-text:#8a6100; --stale-border:#d4a84a;
    }
  }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg3); color:var(--text); font-size:16px; line-height:1.5; min-height:100vh; }

  /* ── Accessibility ── */
  .skip-link { position:absolute; top:-100%; left:1rem; background:var(--accent); color:#fff; padding:8px 16px; border-radius:var(--radius-sm); font-size:13px; z-index:999; text-decoration:none; }
  .skip-link:focus { top:0.5rem; }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  /* card/row actions visible on focus-within too */
  .event-card:focus-within .card-actions { opacity:1; transform:translateY(0); pointer-events:auto; }
  .event-row:focus-within .row-actions { opacity:1; pointer-events:auto; }
  .event-row:focus-within .row-col-extra { opacity:0; pointer-events:none; }
  @media (prefers-reduced-motion:reduce) {
    *, *::before, *::after { animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }

  /* ── Header — title left, nav right, wraps on mobile ── */
  .sticky-top { position:sticky; top:0; z-index:50; }
  .site-header {
    background:var(--bg); border-bottom:0.5px solid var(--border);
    padding:0.75rem 1.5rem;
    display:flex; align-items:center; justify-content:space-between;
    gap:0.75rem; flex-wrap:wrap;
  }
  .header-brand { flex-shrink:0; }
  .site-title { font-size:18px; font-weight:600; }
  .site-tagline { font-size:11px; color:var(--text3); margin-top:2px; }
  .site-sub { font-size:11px; color:var(--text3); margin-top:2px; display:flex; align-items:center; gap:5px; }
  .source-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; animation:pulse 2.5s infinite; flex-shrink:0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  /* nav cluster — hidden, date selection moved to filter bar pill */
  .header-nav { display:none; }

  .nav-chip { font-size:12px; padding:4px 11px; border-radius:999px; border:0.5px solid var(--border2); background:none; cursor:pointer; color:var(--text2); transition:all 0.1s; white-space:nowrap; line-height:1.4; }
  .nav-chip:hover { background:var(--bg2); }
  .nav-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .nav-sep { width:1px; height:18px; background:var(--border2); margin:0 1px; flex-shrink:0; }

  /* ── Date picker dropdown ── */
  .date-picker-wrap { position:relative; }
  .date-picker-btn { display:flex; align-items:center; gap:6px; background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius-sm); padding:5px 11px; font-size:13px; font-weight:500; color:var(--text); cursor:pointer; white-space:nowrap; transition:border-color 0.1s; }
  .date-picker-btn:hover { border-color:var(--accent); }
  .date-picker-btn.open { border-color:var(--accent); }
  .date-picker-btn svg { width:13px; height:13px; color:var(--text3); transition:transform 0.2s; flex-shrink:0; }
  .date-picker-btn.open svg { transform:rotate(180deg); }
  .date-picker-panel { display:none; position:absolute; right:0; top:calc(100% + 6px); background:var(--bg); border:0.5px solid var(--border2); border-radius:var(--radius); padding:14px; min-width:260px; z-index:100; }
  .date-picker-panel.open { display:block; }
  .dp-mode-toggle { display:flex; border:0.5px solid var(--border2); border-radius:var(--radius-sm); overflow:hidden; margin-bottom:14px; }
  .dp-mode-btn { flex:1; background:none; border:none; padding:6px 0; font-size:12px; cursor:pointer; color:var(--text2); transition:background 0.1s,color 0.1s; }
  .dp-mode-btn.active { background:var(--accent); color:#fff; }
  .dp-fields { display:flex; flex-direction:column; gap:8px; }
  .dp-row { display:flex; align-items:center; gap:8px; }
  .dp-label { font-size:11px; color:var(--text3); width:32px; flex-shrink:0; }
  .dp-input { flex:1; font-size:12px; padding:5px 8px; border:0.5px solid var(--border2); border-radius:var(--radius-sm); background:var(--bg2); color:var(--text); outline:none; }
  .dp-input:focus { border-color:var(--accent); }
  .dp-apply { width:100%; margin-top:12px; padding:7px; border-radius:var(--radius-sm); border:none; background:var(--accent); color:#fff; font-size:13px; font-weight:500; cursor:pointer; }
  .dp-apply:hover { background:var(--accent-dark); }

  /* ── Filter row ── */
  .filter-row { padding:0.55rem 1.5rem; background:var(--bg); border-bottom:0.5px solid var(--border); display:flex; gap:6px; flex-wrap:wrap; align-items:center; }

  /* ── Dropdown pills ── */
  .pill-wrap { position:relative; }
  .filter-pill { display:flex; align-items:center; gap:5px; font-size:12px; padding:4px 10px 4px 12px; border-radius:999px; border:0.5px solid var(--border2); background:none; cursor:pointer; color:var(--text2); white-space:nowrap; transition:all 0.15s; line-height:1.4; }
  .filter-pill:hover { background:var(--bg2); border-color:var(--text3); }
  .filter-pill.open { border-color:var(--text3); background:var(--bg2); }
  .filter-pill.filtered { background:var(--green); border-color:var(--green); color:#fff; }
  .filter-pill.filtered:hover { background:var(--accent-dark); border-color:var(--accent-dark); }
  .pill-chev { width:10px; height:10px; transition:transform 0.2s; flex-shrink:0; }
  .filter-pill.open .pill-chev { transform:rotate(180deg); }
  .pill-menu { display:none; position:absolute; top:calc(100% + 4px); left:0; background:var(--bg); border:0.5px solid var(--border2); border-radius:var(--radius); padding:4px; min-width:150px; max-width:280px; z-index:100; max-height:260px; overflow-y:auto; box-shadow:0 8px 24px rgba(0,0,0,0.3); }
  .pill-menu.open { display:block; }
  .pill-menu.align-right { left:auto; right:0; }
  .pill-option { display:block; width:100%; text-align:left; font-size:12px; padding:6px 10px; border:none; background:none; color:var(--text2); cursor:pointer; border-radius:var(--radius-sm); transition:background 0.1s,color 0.1s; }
  .pill-option:hover { background:var(--bg2); color:var(--text); }
  .pill-option.selected { color:var(--green); font-weight:600; }
  .pill-option.selected::before { content:''; display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--green); margin-right:6px; vertical-align:middle; }
  .pill-hint { display:block; font-size:10px; color:var(--text3); font-weight:400; margin-top:1px; }
  /* header theme toggle */
  @keyframes toggle-cw-out { from{opacity:1;transform:rotate(0deg) scale(1);} to{opacity:0;transform:rotate(180deg) scale(0.5);} }
  @keyframes toggle-cw-in { from{opacity:0;transform:rotate(-180deg) scale(0.5);} to{opacity:1;transform:rotate(0deg) scale(1);} }
  .header-theme-toggle { background:none; border:none; cursor:pointer; color:var(--text3); display:grid; place-items:center; padding:4px; transition:color 0.2s; flex-shrink:0; }
  .header-theme-toggle:hover { color:var(--text); }
  .header-theme-toggle svg { width:18px; height:18px; display:block; grid-area:1/1; transition:opacity 0.25s,transform 0.4s cubic-bezier(0.34,1.1,0.64,1); }
  .header-theme-toggle .htt-sun  { opacity:1; transform:rotate(0deg) scale(1); }
  .header-theme-toggle .htt-moon { opacity:0; transform:rotate(-180deg) scale(0.5); }
  [data-theme="dark"] .header-theme-toggle .htt-sun  { opacity:0; transform:rotate(180deg) scale(0.5); }
  [data-theme="dark"] .header-theme-toggle .htt-moon { opacity:1; transform:rotate(0deg) scale(1); }
  .header-theme-toggle.toggling svg { transition:none !important; }
  .header-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .header-contact-btn { color:var(--text3); display:inline-flex; align-items:center; gap:5px; padding:4px 10px; font-size:11px; border-radius:999px; border:0.5px solid var(--border2); background:none; text-decoration:none; transition:color 0.15s,border-color 0.15s; white-space:nowrap; cursor:pointer; }
  .header-contact-btn:hover { color:var(--accent); border-color:var(--accent); text-decoration:none; }
  .header-contact-btn .contact-word { display:inline-block; transition:width 0.3s ease; }
  .clear-filters-btn { display:none; align-items:center; gap:4px; font-size:11px; padding:4px 10px; border-radius:999px; border:0.5px solid rgba(239,79,95,0.4); background:rgba(239,79,95,0.1); color:#ef4f5f; cursor:pointer; white-space:nowrap; transition:all 0.15s; }
  .clear-filters-btn:hover { background:rgba(239,79,95,0.2); border-color:rgba(239,79,95,0.6); }
  .search-wrap { display:flex; align-items:center; }
  .search-icon-btn { background:none; border:0.5px solid var(--border2); border-radius:var(--radius-sm); width:28px; height:28px; cursor:pointer; color:var(--text2); display:flex; align-items:center; justify-content:center; transition:background 0.1s,color 0.1s,border-radius 0.15s; flex-shrink:0; }
  .search-icon-btn:hover { background:var(--bg2); color:var(--text); }
  .search-icon-btn.open { border-radius:var(--radius-sm) 0 0 var(--radius-sm); background:var(--green); border-color:var(--green); color:#fff; }
  .search-box { width:0; height:28px; padding:0; font-size:13px; border:none; border-radius:0 var(--radius-sm) var(--radius-sm) 0; background:var(--bg2); color:var(--text); outline:none; overflow:hidden; transition:width 0.2s ease,padding 0.2s ease,border-color 0.2s ease; }
  .search-box.open { width:200px; padding:0 10px; border:0.5px solid var(--border2); border-left:none; }
  .search-box:focus { border-color:var(--green); }
  .count-label { font-size:12px; color:var(--text3); margin-left:auto; }
  .view-toggle { display:flex; border:0.5px solid var(--border2); border-radius:var(--radius-sm); overflow:hidden; flex-shrink:0; }
  .view-btn { background:none; border:none; width:28px; height:28px; cursor:pointer; color:var(--text3); display:flex; align-items:center; justify-content:center; transition:background 0.1s,color 0.1s; }
  .view-btn:not(:last-child) { border-right:0.5px solid var(--border2); }
  .view-btn.active { background:var(--bg2); color:var(--accent); }
  .view-btn:hover:not(.active) { background:var(--bg2); color:var(--text2); }

  /* ── Row view ── */
  .card-grid.row-view { grid-template-columns:1fr; gap:0; }
  .event-row { position:relative; display:flex; align-items:center; background:var(--bg); border-bottom:0.5px solid var(--border); padding:10px 12px; cursor:pointer; transition:background 0.1s; min-height:0; line-height:1.3; }
  .event-row:first-child { border-top:0.5px solid var(--border); border-radius:var(--radius-sm) var(--radius-sm) 0 0; }
  .event-row:last-child { border-radius:0 0 var(--radius-sm) var(--radius-sm); }
  .event-row:only-child { border-radius:var(--radius-sm); }
  .event-row:hover { background:var(--hover-tint); }
  .row-col { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; flex-shrink:0; font-size:12px; padding-right:10px; }
  .row-col-name   { flex:0 0 26%; font-weight:600; color:var(--text); }
  .row-col-genre  { flex:0 0 8%; color:var(--text3); font-style:italic; font-size:11px; }
  .row-col-venue  { flex:0 0 16%; color:var(--text2); }
  .row-col-city   { flex:0 0 5%; }
  .row-col-time   { flex:1 1 0; min-width:0; overflow:visible; color:var(--text3); font-size:11px; display:flex; align-items:center; gap:0; flex-wrap:nowrap; }
  .row-col-cover  { flex:0 0 6%; padding-right:0; }
  @media (max-width:1000px) {
    .row-col-city { display:none; }
    .row-col-genre { display:none; }
    .row-col-name  { flex:0 0 30%; }
  }
  @media (max-width:800px) {
    .row-col-cover { display:none; }
  }
  .cover-badge { font-size:10px; padding:1px 6px; border-radius:999px; background:var(--cover-bg); color:var(--cover-text); border:0.5px solid var(--cover-border); white-space:nowrap; }
  .row-actions { position:absolute; right:12px; display:flex; gap:6px; opacity:0; transition:opacity 0.1s; pointer-events:none; background:linear-gradient(to right, transparent 0%, rgba(var(--row-fade-rgb),0.95) 30%); padding-left:24px; }
  .event-row:hover .row-actions { opacity:1; pointer-events:auto; }

  /* ── Main ── */
  .main { padding:1.25rem 1.5rem; max-width:1140px; margin:0 auto; min-height:calc(100vh - 160px); }
  .time-block { margin-bottom:1.75rem; }
  .time-block-header { font-size:11px; font-weight:600; color:var(--text3); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:0.6rem; padding-left:2px; }
  .day-section { margin-bottom:1.25rem; }
  .day-header { font-size:15px; font-weight:600; padding:9px 0; background:none; border:none; border-radius:0; display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; transition:color 0.1s; }
  .day-header:hover { color:var(--accent); }
  .day-header.past { opacity:0.45; }
  .day-header-left { display:flex; align-items:center; gap:10px; }
  .day-count { font-size:12px; font-weight:400; color:var(--text3); }
  .day-today-marker { font-size:10px; font-weight:500; background:var(--accent); color:#fff; padding:1px 7px; border-radius:999px; }
  .day-chevron { color:var(--text3); transition:transform 0.2s ease; flex-shrink:0; }
  .day-chevron.closed { transform:rotate(-90deg); }
  .day-body { margin-top:10px; }
  .day-body.hidden { display:none; }
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:10px; }

  /* ── Cards ── */
  .event-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius); padding:0.9rem 1rem 0.6rem; cursor:pointer; transition:border-color 0.15s,background 0.15s; display:flex; flex-direction:column; }
  .event-card:hover { border-color:var(--border2); background:var(--hover-tint); }
  .card-content { flex:1; }
  .card-actions { display:flex; gap:6px; margin-top:10px; padding-top:8px; padding-bottom:4px; border-top:0.5px solid var(--border); opacity:0; transform:translateY(3px); transition:opacity 0.15s,transform 0.15s; pointer-events:none; }
  .event-card:hover .card-actions { opacity:1; transform:translateY(0); pointer-events:auto; }
  .card-action-btn { font-size:11px; padding:4px 10px; border-radius:999px; border:0.5px solid var(--border2); background:var(--bg2); color:var(--text2); cursor:pointer; white-space:nowrap; text-decoration:none; display:inline-flex; align-items:center; gap:4px; transition:background 0.1s,color 0.1s,border-color 0.1s; }
  .card-action-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
  .card-action-btn svg { width:11px; height:11px; flex-shrink:0; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:5px; }
  .artist { font-size:14px; font-weight:600; line-height:1.3; }
  .type-badge { font-size:10px; padding:2px 7px; border-radius:999px; white-space:nowrap; flex-shrink:0; background:var(--bg2); color:var(--text2); border:0.5px solid var(--border2); }
  .type-badge.jam     { background:rgba(29,158,117,0.12); color:var(--green); border-color:var(--green); }
  .type-badge.solo    { background:rgba(52,81,209,0.12); color:var(--solo-text); border-color:var(--solo-border); }
  .type-badge.openmic { background:rgba(186,117,23,0.12); color:var(--openmic-text); border-color:var(--openmic-border); }
  .genre-tag  { font-size:11px; color:var(--text3); margin-bottom:3px; font-style:italic; }
  .venue-name { font-size:13px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .city-abbr { font-size:9px; font-weight:600; color:var(--text3); background:var(--border); padding:1px 5px; border-radius:3px; letter-spacing:0.04em; vertical-align:1px; margin-left:4px; }
  .venue-name-link { color:var(--text2); text-decoration:none; }
  .venue-name-link:hover { color:var(--green); }

  /* location line: city | type */
  .location-line { font-size:11px; color:var(--text3); }
  .location-text { white-space:nowrap; }

  .card-meta  { font-size:12px; color:var(--text3); margin-top:7px; }
  .price-note { margin-top:5px; font-size:12px; font-weight:500; color:var(--accent); }

  /* ── States ── */
  .state-msg { text-align:center; padding:3rem 1rem; color:var(--text2); font-size:14px; }
  .state-msg small { display:block; margin-top:6px; font-size:12px; color:var(--text3); }
  .error-box { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin:1.5rem 0; text-align:center; font-size:13px; color:var(--text2); }

  /* ── Event status ── */
  .event-past { opacity:0.4; }
  .event-past:hover { opacity:0.65; }
  .live-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; color:#ef4f4f; white-space:nowrap; margin-left:6px; background:rgba(239,79,79,0.1); padding:1px 7px; border-radius:999px; }
  .live-dot { width:6px; height:6px; border-radius:50%; background:#ef4f4f; animation:pulse 2s infinite; flex-shrink:0; }
  .starts-in { font-size:10px; color:var(--text3); font-weight:500; margin-left:6px; white-space:nowrap; background:var(--border); padding:1px 7px; border-radius:999px; }
  .ended-badge { font-size:10px; color:var(--text3); font-weight:400; margin-left:6px; white-space:nowrap; opacity:0.7; }
  .time-range-hint { font-size:10px; color:var(--text3); font-weight:400; margin-left:6px; letter-spacing:0; text-transform:none; }

  /* ── Floating next-day badge ── */
  /* ── Floating day pill ── */
  .next-day-fab { display:block; position:fixed; left:50%; top:calc(var(--sticky-h, 95px) + 12px); z-index:90; transform:translateX(-50%) translateY(calc(-100% - 2rem)); opacity:0; pointer-events:none; transition:transform 0.4s cubic-bezier(0.34,1.4,0.64,1),opacity 0.3s ease; border:none; background:none; cursor:pointer; }
  .next-day-fab.visible { transform:translateX(-50%) translateY(0); opacity:1; pointer-events:auto; }
  .next-day-pill { display:flex; align-items:center; gap:5px; padding:6px 14px; border-radius:999px; border:0.5px solid var(--border2); background:var(--bg); color:var(--text2); font-size:12px; font-weight:500; box-shadow:0 4px 16px rgba(0,0,0,0.12); white-space:nowrap; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }

/* ── Modal ── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200; align-items:center; justify-content:center; padding:1rem; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg); border-radius:var(--radius); border:0.5px solid var(--border); max-width:460px; width:100%; padding:1.5rem; position:relative; max-height:90vh; overflow-y:auto; }
  .modal-close { position:absolute; top:1rem; right:1rem; background:none; border:none; font-size:20px; cursor:pointer; color:var(--text3); width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-sm); transition:background 0.1s; }
  .modal-close:hover { background:var(--bg2); }
  .modal-artist { font-size:20px; font-weight:600; padding-right:2.5rem; margin-bottom:3px; line-height:1.3; }
  .modal-genre { font-size:13px; color:var(--text3); margin-bottom:4px; font-style:italic; }
  .modal-date-line { font-size:13px; color:var(--text2); margin-bottom:1rem; }
  .modal-rows { display:flex; flex-direction:column; gap:12px; margin-top:0.75rem; }
  .modal-row { display:flex; gap:12px; align-items:flex-start; }
  .modal-icon { width:22px; flex-shrink:0; padding-top:2px; color:var(--text3); display:flex; }
  .modal-row-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:2px; }
  .modal-row-value { font-size:14px; color:var(--text); }
  .modal-link { display:inline-block; font-size:13px; color:var(--green); text-decoration:none; margin-top:2px; }
  .modal-link:hover { text-decoration:underline; }
  .modal-directions { display:inline-flex; align-items:center; gap:4px; font-size:13px; color:var(--accent); text-decoration:none; margin-top:4px; }
  .modal-directions:hover { text-decoration:underline; }
  .modal-directions svg { width:13px; height:13px; fill:currentColor; }

  /* ── Footer ── */
  .site-footer { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1.5rem; font-size:11px; color:var(--text3); border-top:0.5px solid var(--border); margin-top:0; gap:1rem; flex-wrap:wrap; }
  .site-footer a { color:var(--green); text-decoration:none; }
  .site-footer a:hover { text-decoration:underline; }
  .footer-left { text-align:left; }
  .footer-right { text-align:right; }
  .footer-contact-btn { display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:6px 16px; border-radius:999px; border:0.5px solid var(--border2); background:none; color:var(--text2); cursor:pointer; text-decoration:none; transition:all 0.15s; }
  .site-footer .footer-contact-btn:hover { border-color:var(--accent); color:var(--accent); text-decoration:none; }
  @media (max-width:640px) {
    .site-footer { flex-direction:column; text-align:center; }
    .footer-left, .footer-right { text-align:center; }
  }

  /* (old chip/select styles removed — using pill-wrap system now) */

  /* ── Bottom sheet (mobile filters) ── */
  .mobile-filter-btn { display:none; font-size:12px; padding:4px 12px; border-radius:999px; border:0.5px solid var(--border2); background:none; cursor:pointer; color:var(--text2); white-space:nowrap; transition:all 0.1s; }
  .mobile-filter-btn:hover { background:var(--bg2); }
  .mobile-filter-btn.has-filters { border-color:var(--green); background:var(--green); color:#fff; }
  .bottomsheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:300; }
  .bottomsheet-overlay.open { display:block; }
  .bottomsheet { position:fixed; bottom:-1px; left:0; right:0; background:var(--bg); border-top:0.5px solid var(--border2); border-radius:16px 16px 0 0; padding:0 1.25rem calc(2rem + env(safe-area-inset-bottom,0px)); padding-bottom:calc(2rem + env(safe-area-inset-bottom,0px)); z-index:301; transform:translateY(100%); transition:transform 0.25s ease; max-height:85vh; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; }
  .bottomsheet.open { transform:translateY(0); }
  .bs-header { padding:12px 0 8px; cursor:grab; touch-action:none; }
  .bs-handle { width:36px; height:4px; border-radius:2px; background:var(--border2); margin:0 auto 0; }
  .bs-section { margin-bottom:16px; }
  .bs-label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
  .bs-options { display:flex; flex-wrap:wrap; gap:6px; }
  .bs-opt { font-size:12px; padding:6px 14px; border-radius:999px; border:0.5px solid var(--border2); background:none; cursor:pointer; color:var(--text2); white-space:nowrap; transition:all 0.1s; }
  .bs-opt:hover { background:var(--bg2); }
  .bs-opt.active { background:var(--green); border-color:var(--green); color:#fff; }

  /* ── Calendar strip ── */
  .cal-strip { display:flex; gap:6px; overflow-x:auto; padding:4px 0 12px; -ms-overflow-style:none; scrollbar-width:none; }
  .cal-strip::-webkit-scrollbar { display:none; }
  .cal-day { display:flex; flex-direction:column; align-items:center; gap:1px; padding:6px 10px; border-radius:999px; border:0.5px solid var(--border2); background:none; cursor:pointer; color:var(--text2); font-size:11px; white-space:nowrap; transition:all 0.15s; flex-shrink:0; line-height:1.3; }
  .cal-day:hover { background:var(--bg2); border-color:var(--text3); }
  .cal-day.today { border-color:var(--accent); color:var(--accent); font-weight:600; }
  .cal-day.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .cal-day.active.today { background:var(--accent); color:#fff; }
  .cal-day.empty { opacity:0.35; }
  .cal-day-count { font-size:9px; opacity:0.7; }

  /* ── Map view ── */
  #map-container { height:calc(100vh - 160px); min-height:400px; border-radius:var(--radius); overflow:hidden; width:100%; }
  .leaflet-popup-content-wrapper { background:var(--bg); color:var(--text); border:0.5px solid var(--border2); border-radius:var(--radius); box-shadow:0 4px 16px rgba(0,0,0,0.25); }
  .leaflet-popup-tip { background:var(--bg); }
  .leaflet-popup-content { font-family:inherit; font-size:13px; line-height:1.5; margin:12px 14px; }
  .leaflet-popup-content .map-popup-venue { font-size:14px; font-weight:600; margin-bottom:6px; color:var(--text); }
  .leaflet-popup-content .map-popup-show { padding:4px 0; border-bottom:0.5px solid var(--border); }
  .leaflet-popup-content .map-popup-show:last-child { border-bottom:none; }
  .leaflet-popup-content .map-popup-artist { font-weight:500; color:var(--text); }
  .leaflet-popup-content .map-popup-time { font-size:11px; color:var(--text3); }
  .leaflet-popup-content .map-popup-badge { font-size:9px; padding:1px 6px; border-radius:999px; background:var(--bg2); color:var(--text2); border:0.5px solid var(--border2); margin-left:4px; vertical-align:middle; }

  /* ── Responsive ── */
  @media (max-width:640px) {
    .site-header { padding:0.75rem 1rem; flex-wrap:nowrap; }
    .header-brand { flex:1; min-width:0; }
    .filter-row { padding:0.6rem 1rem; gap:8px; }
    .search-wrap.search-open { width:100%; order:-1; }
    .search-wrap.search-open .search-box.open { width:100%; flex:1; }
    .main { padding:1rem; }
    .card-grid { grid-template-columns:1fr; }
    .search-icon-btn { width:38px; height:38px; }
    .search-box { max-width:100%; font-size:16px; height:38px; }
    .filter-pill { font-size:14px; padding:7px 14px 7px 16px; }
    .pill-chev { width:12px; height:12px; }
    .mobile-filter-btn { font-size:14px; padding:7px 16px; }
    .count-label { font-size:14px; }
    .date-picker-btn { font-size:14px; }
    /* force card view on mobile (unless map) */
    .card-grid.row-view { gap:10px; }
    .event-row { display:none; }
    /* always show card actions on mobile (no hover) */
    .event-card .card-actions { opacity:1; transform:translateY(0); pointer-events:auto; }
    .nav-sep { display:none !important; }
    .header-contact-btn { display:none !important; }
    .view-toggle { display:none !important; }
    /* hide most pill dropdowns on mobile, keep date + region visible */
    .filter-row .pill-wrap { display:none !important; }
    .filter-row .pill-wrap.mobile-show { display:block !important; }
    .filter-row .search-divider, .filter-row .clear-filters-btn { display:none !important; }
    .mobile-filter-btn { display:inline-flex; align-items:center; gap:4px; }
    .count-label { display:none; }
    /* disable hover effects on touch devices */
    .event-card:hover { border-color:var(--border); background:var(--bg); }
    .day-header:hover { color:inherit; }
    .filter-pill:hover { background:none; border-color:var(--border2); }
    .card-action-btn:hover { background:var(--bg2); border-color:var(--border2); color:var(--text2); }
    .header-theme-toggle:hover { color:var(--text3); }
    .pill-option:hover { background:none; color:var(--text2); }
    .bs-opt:hover { background:none; }
  }
</style>
</head>
<body>

<a class="skip-link" href="#listing">Skip to shows</a>
<div class="sticky-top">
<header class="site-header" role="banner">
  <div class="header-brand">
    <a href="/" onclick="event.preventDefault();resetHome();" style="text-decoration:none;color:inherit;">
      <h1 class="site-title">Rogue Valley Live Music</h1>
      <p class="site-tagline">Live music in the heart of the Rogue Valley</p>
    </a>
  </div>

  <div class="header-actions">
    <a class="header-contact-btn" id="header-contact" href="mailto:roguevalleylivemusic@gmail.com" aria-label="Contact">
      <span class="contact-word" id="contact-word">Updates</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </a>
    <button class="header-theme-toggle" id="header-theme-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode">
      <svg class="htt-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="htt-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <div class="header-nav">
    <nav id="quick-chips" aria-label="Date range" style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;">
      <button class="nav-chip"        id="chip-today"    onclick="applyQuick(this,'today')">Today</button>
      <button class="nav-chip"        id="chip-tomorrow" onclick="applyQuick(this,'tomorrow')">Tomorrow</button>
      <button class="nav-chip"        id="chip-weekend"  onclick="applyQuick(this,'weekend')">Weekend</button>
      <button class="nav-chip"        id="chip-week"     onclick="applyQuick(this,'week')">This week</button>
      <button class="nav-chip active" id="chip-next7"    onclick="applyQuick(this,'next7')">Next 7 days</button>
      <button class="nav-chip"        id="chip-month"    onclick="applyQuick(this,'month')">This month</button>
    </nav>

    <div class="nav-sep" aria-hidden="true"></div>

    <!-- Date picker dropdown -->
    <div class="date-picker-wrap" id="dp-wrap">
      <button class="date-picker-btn" id="dp-btn" onclick="toggleDatePicker()" aria-haspopup="true" aria-expanded="false" aria-label="Pick date range">
        <span id="dp-label">Today</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="date-picker-panel" id="dp-panel">
        <div class="dp-mode-toggle">
          <button class="dp-mode-btn active" id="dp-single-btn" onclick="setDpMode('single')">Single day</button>
          <button class="dp-mode-btn" id="dp-range-btn" onclick="setDpMode('range')">Date range</button>
        </div>
        <div class="dp-fields">
          <div class="dp-row">
            <label class="dp-label" id="dp-from-label" for="dp-from">Date</label>
            <input class="dp-input" type="date" id="dp-from">
          </div>
          <div class="dp-row" id="dp-to-row" style="display:none;">
            <label class="dp-label" for="dp-to">To</label>
            <input class="dp-input" type="date" id="dp-to">
          </div>
        </div>
        <button class="dp-apply" onclick="applyDatePicker()">Apply</button>
      </div>
    </div>
  </div>
</header>

<div id="stale-bar" style="display:none;align-items:center;justify-content:center;gap:8px;padding:6px 1rem;background:var(--stale-bg);border-bottom:0.5px solid var(--stale-border);font-size:12px;color:var(--stale-text);">
  <span></span>
  <button onclick="hideStaleNotice();loadData()" style="background:none;border:0.5px solid var(--stale-border);border-radius:999px;padding:2px 10px;font-size:11px;color:var(--stale-text);cursor:pointer;">Retry</button>
</div>
<div class="filter-row" role="toolbar" aria-label="Filters">
  <div class="search-wrap">
    <button class="search-icon-btn" id="search-btn" onclick="toggleSearch()" aria-label="Search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <input class="search-box" type="search" placeholder="Artist or venue…" oninput="debouncedSearch()" id="search" aria-label="Search artists or venues">
  </div>
  <span style="width:1px;height:18px;background:var(--border2);margin:0 2px;flex-shrink:0;" class="search-divider"></span>
  <div class="pill-wrap mobile-show">
    <button class="filter-pill" id="pill-date" onclick="togglePill('date')" aria-haspopup="true" aria-expanded="false">
      <span id="pill-date-label">Next 7 days</span>
      <svg class="pill-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="pill-menu" id="pill-date-menu" role="menu">
      <button class="pill-option" role="menuitem" onclick="pickDate('today','Today')">Today</button>
      <button class="pill-option" role="menuitem" onclick="pickDate('tomorrow','Tomorrow')">Tomorrow</button>
      <button class="pill-option" role="menuitem" onclick="pickDate('weekend','Weekend')">Weekend</button>
      <button class="pill-option" role="menuitem" onclick="pickDate('week','This week')">This week</button>
      <button class="pill-option selected" role="menuitem" onclick="pickDate('next7','Next 7 days')">Next 7 days</button>
      <button class="pill-option" role="menuitem" onclick="pickDate('month','This month')">This month</button>
    </div>
  </div>
  <div class="pill-wrap mobile-show">
    <button class="filter-pill" id="pill-region" onclick="togglePill('region')" aria-haspopup="true" aria-expanded="false">
      <span id="pill-region-label">Region</span>
      <svg class="pill-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="pill-menu" id="pill-region-menu" role="menu">
      <button class="pill-option selected" role="menuitem" onclick="pickFilter('region','all','Region')">All regions</button>
      <button class="pill-option" role="menuitem" onclick="pickFilter('region','Medford','Medford')">Medford <span class="pill-hint">Jacksonville, Central Point, Phoenix, Eagle Point</span></button>
      <button class="pill-option" role="menuitem" onclick="pickFilter('region','Ashland','Ashland')">Ashland <span class="pill-hint">Talent</span></button>
      <button class="pill-option" role="menuitem" onclick="pickFilter('region','GrantsPass','Grants Pass')">Grants Pass <span class="pill-hint">Cave Junction, Merlin, Williams</span></button>
      <button class="pill-option" role="menuitem" onclick="pickFilter('region','RogueRiver','Rogue River')">Rogue River <span class="pill-hint">Gold Hill, Shady Cove</span></button>
    </div>
  </div>
  <div class="pill-wrap">
    <button class="filter-pill" id="pill-type" onclick="togglePill('type')" aria-haspopup="true" aria-expanded="false">
      <span id="pill-type-label">Type</span>
      <svg class="pill-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="pill-menu" id="pill-type-menu" role="menu">
      <button class="pill-option selected" role="menuitem" onclick="pickFilter('type','all','Type')">All types</button>
      <button class="pill-option" role="menuitem" onclick="pickFilter('type','Band','Band')">Band</button>
      <button class="pill-option" role="menuitem" onclick="pickFilter('type','Solo','Solo')">Solo</button>
      <button class="pill-option" role="menuitem" onclick="pickFilter('type','Jam','Jam')">Jam</button>
      <button class="pill-option" role="menuitem" onclick="pickFilter('type','Open Mic','Open Mic')">Open Mic</button>
    </div>
  </div>
  <div class="pill-wrap">
    <button class="filter-pill" id="pill-genre" onclick="togglePill('genre')" aria-haspopup="true" aria-expanded="false">
      <span id="pill-genre-label">Genre</span>
      <svg class="pill-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="pill-menu" id="pill-genre-menu" role="menu">
      <button class="pill-option selected" role="menuitem" onclick="pickFilter('genre','all','Genre')">All genres</button>
    </div>
  </div>
  <div class="pill-wrap">
    <button class="filter-pill" id="pill-venue" onclick="togglePill('venue')" aria-haspopup="true" aria-expanded="false">
      <span id="pill-venue-label">Venue type</span>
      <svg class="pill-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="pill-menu align-right" id="pill-venue-menu" role="menu">
      <button class="pill-option selected" role="menuitem" onclick="pickFilter('venue','all','Venue type')">All venue types</button>
    </div>
  </div>
  <button class="clear-filters-btn" id="clear-filters-btn" onclick="clearAllFilters()" style="display:none;" aria-label="Clear all filters">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Clear filters
  </button>
  <button class="mobile-filter-btn" id="mobile-filter-btn" onclick="openBottomSheet()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>Filters
  </button>
  <span class="count-label" id="count-label" aria-live="polite"></span>
  <div class="view-toggle">
    <button class="view-btn active" id="view-card-btn" onclick="setView('card')" title="Card view" aria-label="Card view">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>

<script>
const SOURCE_URL='http://roguevalleylivemusicnightlife.com/musiclist.txt';
const PROXIES=[
  {url:'https://api.allorigins.win/raw?url='+encodeURIComponent(SOURCE_URL), json:false, extract:t=>t},
  {url:'https://api.codetabs.com/v1/proxy/?quest='+encodeURIComponent(SOURCE_URL), json:false, extract:t=>t},
  {url:'https://api.allorigins.win/get?url='+encodeURIComponent(SOURCE_URL), json:true, extract:j=>j.contents},
];
const CACHE_KEY='rogue_live_cache';
const CACHE_TS_KEY='rogue_live_cache_ts';
const CACHE_MAX_AGE=6*60*60*1000; // 6 hours

let allEvents=[], rangeStart, rangeEnd, activeRegion='all', activeType='all', activeGenre='all', activeVenueType='all', viewMode='card', _didScrollToday=false;

/* ── Utils ── */
function midnight(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function fmtISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function dayLabel(d){
  const t=midnight(new Date()),diff=Math.round((midnight(d)-t)/86400000);
  const base=d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  if(diff===0)return'Today — '+base;
  if(diff===1)return'Tomorrow — '+base;
  if(diff===-1)return'Yesterday — '+base;
  return base;
}
function shortDay(d){return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}

function parseTime(t,startRaw){
  if(!t||!t.trim())return'TBD';
  const s=t.trim().padStart(4,'0');
  let h=parseInt(s.slice(0,s.length-2),10);
  const m=s.slice(-2);
  // handle 24:00 as midnight
  if(h>=24)h=0;
  // if this is an end time and it looks like it wrapped past midnight
  // (e.g. start=2000, end=1200 — they mean midnight not noon)
  if(startRaw){
    const ss=startRaw.trim().padStart(4,'0');
    const sh=parseInt(ss.slice(0,ss.length-2),10);
    if(sh>=17&&h>0&&h<=12&&h<sh)h=0; // treat as midnight
  }
  return(h===0?12:h>12?h-12:h)+':'+m+(h>=12?' PM':' AM');
}
function parseEntryDate(d){
  if(!d)return null;
  const p=d.trim().split('/');
  if(p.length!==3)return null;
  const yr=parseInt(p[2],10);
  return new Date(yr<100?2000+yr:yr,parseInt(p[0],10)-1,parseInt(p[1],10));
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cityAbbr(c){const m={'Medford':'MED','Ashland':'ASH','Grants Pass':'GP','Jacksonville':'JVL','Rogue River':'RR','Central Point':'CP','Talent':'TLN','Phoenix':'PHX','Eagle Point':'EAG','Gold Hill':'GLD','White City':'WC','Shady Cove':'SDC','Cave Junction':'CVJ','Merlin':'MRL','Applegate':'APG','Williams':'WMS','Selma':'SLM'};return m[c]||c.slice(0,3).toUpperCase();}

/* directions link — uses venue name + city for Google Maps */
function mapsUrl(venue,city,address){
  const q=address?address:(venue+(city?', '+city+', OR':''));
  return'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(q);
}

const ARROW_SVG=`<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;

/* ── Parser ── */
function parseTxt(txt){
  const lines=txt.split('\n');let section='';
  const venues={},events=[];
  for(let raw of lines){
    const line=raw.trim();
    if(!line)continue;
    if(line==='--venues'){section='venues';continue;}
    if(line==='--events'){section='events';continue;}
    if(line.startsWith('--')||line.startsWith('*'))continue;
    if(section==='venues'){
      const p=line.split('|');
      if(p.length>=6){
        const n=p[0].trim();
        venues[n]={url:p[1]?.trim()||'',city:p[2]?.trim()||'',notes:p[3]?.trim()||'',region:p[5]?.trim()||'',type:p[6]?.trim()||''};
      }
    } else if(section==='events'){
      const p=line.split('|');
      if(p.length<11)continue;
      const dateObj=parseEntryDate(p[6]?.trim());
      if(!dateObj)continue;
      const vname=p[4]?.trim()||'',v=venues[vname]||{};
      // extract address from venue notes if it looks like one
      const addrMatch=v.notes&&/\d+\s+\w/.test(v.notes)?v.notes:'';
      events.push({
        musician:p[0]?.trim()||'Unknown',genre:p[1]?.trim()||'',
        link:p[2]?.trim()||'',linkName:p[3]?.trim()||'',
        venue:vname,venueUrl:v.url||'',city:v.city||'',
        region:v.region||'',venueType:v.type||'',venueAddress:addrMatch,
        date:dateObj,dateStr:fmtISO(dateObj),
        startRaw:p[7]?.trim()||'',endRaw:p[8]?.trim()||'',
        notes:p[9]?.trim()||'',eventType:p[10]?.trim()||'Band'
      });
    }
  }
  events.forEach((e,i)=>e._idx=i);
  return events;
}

/* ── Load ── */
const LOADING_MESSAGES=[
  "Tuning up",
  "Warming up the amps",
  "Checking the setlist",
  "Rolling up to the venue",
  "Grabbing a spot up front",
  "Waiting for the opener",
  "Asking around for shows",
  "Scanning the marquee",
  "Plugging in",
  "Mic check, one two",
  "Loading the van",
  "Taping up the setlist",
  "Dimming the house lights",
];
const LOADING_ICONS=["&#127928;","&#127911;","&#127926;","&#127927;","&#127930;","&#127929;","&#127931;","&#119070;","&#127932;","&#128266;"];
let _loadIconIdx=0,_loadIconTimer,_loadDotsTimer,_loadDotCount=0;
function loadingMsg(){
  const msg=LOADING_MESSAGES[Math.floor(Math.random()*LOADING_MESSAGES.length)];
  return'<span id="load-icon" style="font-size:22px;display:block;margin-bottom:6px;">'+LOADING_ICONS[0]+'</span>'+msg+'<span id="load-dots">.</span>';
}
function startIconCycle(){
  clearInterval(_loadIconTimer);clearInterval(_loadDotsTimer);
  _loadIconIdx=0;_loadDotCount=0;
  _loadIconTimer=setInterval(()=>{
    _loadIconIdx=(_loadIconIdx+1)%LOADING_ICONS.length;
    const el=document.getElementById('load-icon');

      setTimeout(()=>{el.innerHTML=LOADING_ICONS[_loadIconIdx];el.style.opacity='1';},150);
    }else clearInterval(_loadIconTimer);
  },2000);
  _loadDotsTimer=setInterval(()=>{

    const el=document.getElementById('load-dots');
    if(el)el.textContent='.'.repeat(_loadDotCount||1);
    else clearInterval(_loadDotsTimer);

}
function stopIconCycle(){clearInterval(_loadIconTimer);clearInterval(_loadDotsTimer);}

const FAIL_MESSAGES=[
  {title:"The band's on break",sub:"Even the internet needs a smoke break sometimes."},
  {title:"Feedback loop",sub:"Not the good kind. Our data source hit a sour note."},
  {title:"Lost the setlist",sub:"We had all the shows, then the wind took 'em."},
  {title:"Sound check... failed",sub:"One-two, one-two\u2014nope, nothing's coming through."},
  {title:"The venue cancelled",sub:"Just kidding, but our data source really did ghost us."},
  {title:"Amp blew out",sub:"The signal's fried. We'll get a new tube in a sec."},
  {title:"Stuck in the green room",sub:"The data is in there somewhere, just not coming out."},
  {title:"Wrong chord",sub:"We reached for the data and hit a clunker instead."},
  {title:"Encore denied",sub:"The crowd wants more, but the server walked offstage."},
  {title:"Guitar string snapped",sub:"Give us a moment to re-tune and try again."},
];

function failMsg(){return FAIL_MESSAGES[Math.floor(Math.random()*FAIL_MESSAGES.length)];}

function fetchWithTimeout(url,ms=8000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(timer));
}

function saveCache(txt){
  try{localStorage.setItem(CACHE_KEY,txt);localStorage.setItem(CACHE_TS_KEY,Date.now().toString());}catch(e){}
}
function loadCache(){
  try{
    const txt=localStorage.getItem(CACHE_KEY),ts=parseInt(localStorage.getItem(CACHE_TS_KEY)||'0',10);
    if(!txt)return null;
    return{txt,ts,stale:Date.now()-ts>CACHE_MAX_AGE};
  }catch(e){return null;}
}

function showStaleNotice(ts){
  const ago=Math.round((Date.now()-ts)/60000);
  const label=ago<60?ago+'m ago':Math.round(ago/60)+'h ago';
  const bar=document.getElementById('stale-bar');
  if(bar){bar.style.display='flex';bar.querySelector('span').textContent='Showing cached data ('+label+'). Live source unavailable.';}
}
function hideStaleNotice(){const bar=document.getElementById('stale-bar');if(bar)bar.style.display='none';}

async function fetchFromProxies(){
  // race all proxies in parallel — first success wins
  return new Promise((resolve,reject)=>{
    let resolved=false,errors=0;
    PROXIES.forEach(p=>{
      fetchWithTimeout(p.url).then(res=>{
        if(!res.ok)throw new Error('HTTP '+res.status);
        return p.json?res.json():res.text();
      }).then(body=>{
        const txt=p.json?p.extract(body):body;
        if(!txt||txt.length<50)throw new Error('Empty response');
        if(!resolved){resolved=true;resolve(txt);}
      }).catch(()=>{
        errors++;
        if(errors===PROXIES.length&&!resolved)reject(new Error('All sources failed'));
      });
    });
  });
}

const CACHE_FRESH=30*60*1000; // 30 minutes — skip API if cache is this fresh

async function loadData(){
  /* Show cached data instantly if available */
  const cached=loadCache();
  if(cached){
    allEvents=parseTxt(cached.txt);
    populateFilterDropdowns();
    render();
    openFromUrl();
    // skip API call if cache is fresh enough
    if(Date.now()-cached.ts<CACHE_FRESH)return;
  }

  /* Fetch fresh data */
  try{
    const txt=await fetchFromProxies();
    saveCache(txt);
    hideStaleNotice();
    allEvents=parseTxt(txt);
    populateFilterDropdowns();
    render();
    openFromUrl();
  }catch(err){
    if(cached){
      /* We already rendered cached data — just show the stale notice */
      showStaleNotice(cached.ts);
    }else{
      const m=failMsg();
      document.getElementById('listing').innerHTML=`<div class="error-box">
        <p style="font-size:22px;margin-bottom:4px">&#127928;</p>
        <p style="font-weight:600;font-size:15px;margin-bottom:6px">${esc(m.title)}</p>
        <p>${esc(m.sub)}</p>
        <button onclick="loadData()" style="margin-top:14px;padding:7px 20px;border-radius:999px;border:0.5px solid var(--border2);background:var(--accent);color:#fff;font-size:13px;cursor:pointer;">Try again</button>
        <p style="margin-top:12px;font-size:11px;color:var(--text3)">${esc(err.message)}</p>
      </div>`;
    }
  }
}

/* ── Nav ── */
function clearQuickChips(){document.querySelectorAll('.nav-chip:not(#chip-range)').forEach(b=>b.classList.remove('active'));}

let dpMode='single'; // 'single' | 'range'

function applyQuick(btn,q){
  clearQuickChips();btn.classList.add('active');
  const t=midnight(new Date());
  if(q==='today')        {rangeStart=t;rangeEnd=t;}
  else if(q==='tomorrow'){rangeStart=addDays(t,1);rangeEnd=addDays(t,1);}
  else if(q==='weekend') {const dow=t.getDay(),toSat=dow===6?0:6-dow;rangeStart=addDays(t,toSat);rangeEnd=addDays(rangeStart,1);}
  else if(q==='week')    {const dow=t.getDay();rangeStart=addDays(t,-dow);rangeEnd=addDays(rangeStart,6);}
  else if(q==='next7')   {rangeStart=t;rangeEnd=addDays(t,6);}
  else if(q==='month')   {rangeStart=new Date(t.getFullYear(),t.getMonth(),1);rangeEnd=new Date(t.getFullYear(),t.getMonth()+1,0);}
  syncDpInputsFromRange();
  updateDpLabel();
  // sync mobile date pill label
  const labels={today:'Today',tomorrow:'Tomorrow',weekend:'Weekend',week:'This week',next7:'Next 7 days',month:'This month'};
  const dpLbl=document.getElementById('pill-date-label');
  if(dpLbl)dpLbl.textContent=labels[q]||'Custom';
  syncUrl();
  render();
}

function pickDate(q,label){
  const defaultRange='today';
  // reuse applyQuick logic
  const chip=document.getElementById('chip-'+q);
  if(chip)applyQuick(chip,q);
  // update date pill label + filtered state
  const pill=document.getElementById('pill-date');
  document.getElementById('pill-date-label').textContent=label;
  if(pill)pill.classList.toggle('filtered',q!==defaultRange);
  // update selected state in menu
  document.querySelectorAll('#pill-date-menu .pill-option').forEach(o=>o.classList.remove('selected'));
  if(event&&event.target)event.target.classList.add('selected');
  // close menu
  const menu=document.getElementById('pill-date-menu');
  if(pill){pill.classList.remove('open');pill.setAttribute('aria-expanded','false');}
  if(menu)menu.classList.remove('open');
}

function toggleDatePicker(){
  const panel=document.getElementById('dp-panel');
  const btn=document.getElementById('dp-btn');
  const open=panel.classList.toggle('open');
  btn.classList.toggle('open',open);
  btn.setAttribute('aria-expanded',open);
  if(open) syncDpInputsFromRange();
}

function closeDatePicker(){
  document.getElementById('dp-panel').classList.remove('open');
  const btn=document.getElementById('dp-btn');
  btn.classList.remove('open');
  btn.setAttribute('aria-expanded','false');
}

function setDpMode(mode){
  dpMode=mode;
  document.getElementById('dp-single-btn').classList.toggle('active',mode==='single');
  document.getElementById('dp-range-btn').classList.toggle('active',mode==='range');
  document.getElementById('dp-to-row').style.display=mode==='range'?'flex':'none';
  document.getElementById('dp-from-label').textContent=mode==='range'?'From':'Date';
}

function syncDpInputsFromRange(){
  document.getElementById('dp-from').value=fmtISO(rangeStart);
  document.getElementById('dp-to').value=fmtISO(rangeEnd);
  setDpMode(fmtISO(rangeStart)===fmtISO(rangeEnd)?'single':'range');
}

function applyDatePicker(){
  const from=document.getElementById('dp-from').value;
  if(!from)return;
  rangeStart=midnight(new Date(from+'T12:00:00'));
  if(dpMode==='range'){
    const to=document.getElementById('dp-to').value;
    rangeEnd=to?midnight(new Date(to+'T12:00:00')):rangeStart;
    if(rangeEnd<rangeStart)rangeEnd=rangeStart;
  } else {
    rangeEnd=rangeStart;
  }
  clearQuickChips();
  updateDpLabel();
  closeDatePicker();
  syncUrl();
  render();
}

function updateDpLabel(){
  const s=rangeStart,e=rangeEnd;
  const el=document.getElementById('dp-label');
  if(fmtISO(s)===fmtISO(e)){
    const t=midnight(new Date()),diff=Math.round((midnight(s)-t)/86400000);
    el.textContent=diff===0?'Today':diff===1?'Tomorrow':shortDay(s);
  } else {
    el.textContent=shortDay(s)+' – '+shortDay(e);
  }
}

/* ── Pill dropdown filters ── */
const FILTER_STATE={region:'all',type:'all',genre:'all',venue:'all'};
const FILTER_DEFAULTS={region:'Region',type:'Type',genre:'Genre',venue:'Venue type'};

function togglePill(name){
  closeAllPills(name);

  const pill=document.getElementById('pill-'+name);

function closeAllPills(except){
  ['date','region','type','genre','venue'].forEach(n=>{
    if(n===except)return;
    const m=document.getElementById('pill-'+n+'-menu');
    const p=document.getElementById('pill-'+n);

function pickFilter(name,value,label){
  FILTER_STATE[name]=value;
  if(name==='region')activeRegion=value;
  else if(name==='type')activeType=value;
  else if(name==='genre')activeGenre=value;
  else if(name==='venue')activeVenueType=value;

  const pill=document.getElementById('pill-'+name);
  const lbl=document.getElementById('pill-'+name+'-label');
  const isDefault=value==='all';
  lbl.textContent=isDefault?FILTER_DEFAULTS[name]:label;
  pill.classList.toggle('filtered',!isDefault);

  document.querySelectorAll('#pill-'+name+'-menu .pill-option').forEach(o=>o.classList.remove('selected'));

function hasActiveFilters(){return activeRegion!=='all'||activeType!=='all'||activeGenre!=='all'||activeVenueType!=='all';}
function updateClearBtn(){

  const labels={today:'Today',next7:'Next 7 days'};

  history.replaceState(null,'',location.pathname);

  activeRegion='all';activeType='all';activeGenre='all';activeVenueType='all';
  FILTER_STATE.region='all';FILTER_STATE.type='all';FILTER_STATE.genre='all';FILTER_STATE.venue='all';
  syncPillUi('region','all');syncPillUi('type','all');syncPillUi('genre','all');syncPillUi('venue','all');

function setRegion(r){activeRegion=r;FILTER_STATE.region=r;syncPillUi('region',r);updateClearBtn();syncUrl();render();}

function setVenueType(v){activeVenueType=v;FILTER_STATE.venue=v;syncPillUi('venue',v);updateClearBtn();syncUrl();render();}

function syncPillUi(name,value){
  const pill=document.getElementById('pill-'+name);
  const lbl=document.getElementById('pill-'+name+'-label');
  if(!pill||!lbl)return;
  const isDefault=value==='all';
  pill.classList.toggle('filtered',!isDefault);
  // find the matching option label
  const opt=[...document.querySelectorAll('#pill-'+name+'-menu .pill-option')].find(o=>o.textContent.trim()===value||
    (isDefault&&o.textContent.trim().startsWith('All')));
  lbl.textContent=isDefault?FILTER_DEFAULTS[name]:(opt?opt.textContent.trim():value);
  document.querySelectorAll('#pill-'+name+'-menu .pill-option').forEach(o=>o.classList.remove('selected'));
  if(opt)opt.classList.add('selected');
}

/* ── Filter ── */
function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const s=midnight(rangeStart),e=midnight(rangeEnd);
  return allEvents.filter(ev=>{
    const d=midnight(ev.date);
    if(d<s||d>e)return false;
    if(activeRegion!=='all'&&ev.region!==activeRegion)return false;
    if(activeType!=='all'&&ev.eventType!==activeType)return false;
    if(activeGenre!=='all'&&ev.genre!==activeGenre)return false;
    if(activeVenueType!=='all'&&ev.venueType!==activeVenueType)return false;
    if(q&&!ev.musician.toLowerCase().includes(q)&&!ev.venue.toLowerCase().includes(q)&&!ev.city.toLowerCase().includes(q))return false;
    return true;
  });
}

const BUCKETS=['Morning','Afternoon','Early evening','Evening','Late night'];
const BUCKET_HINTS={Morning:'before noon',Afternoon:'12 – 5 PM','Early evening':'5 – 8 PM',Evening:'8 – 10 PM','Late night':'after 10 PM'};
function timeBucket(r){const h=r?parseInt(r.padStart(4,'0').slice(0,2),10):20;return h<12?'Morning':h<17?'Afternoon':h<20?'Early evening':h<22?'Evening':'Late night';}

/* ── Event status (live / past) ── */
function eventStatus(e){
  const now=new Date();
  if(fmtISO(e.date)!==fmtISO(now))return e.date<midnight(now)?'past':'upcoming';
  const nowMin=now.getHours()*60+now.getMinutes();
  function toMin(raw){if(!raw||!raw.trim())return null;const s=raw.trim().padStart(4,'0');return parseInt(s.slice(0,s.length-2),10)*60+parseInt(s.slice(-2),10);}
  let start=toMin(e.startRaw),end=toMin(e.endRaw);
  if(start===null)return'upcoming';
  // if end time wraps past midnight (e.g. start=2000, end=1200), treat end as next-day
  if(end!==null&&start>=1020&&end<=720)end=1440; // clamp to midnight
  if(end!==null&&nowMin>end)return'past';
  if(nowMin>=start&&(end===null||nowMin<=end))return'live';
  if(end===null&&nowMin>start+120)return'past'; // assume 2h if no end
  return'upcoming';
}
function statusHtml(e){
  const s=eventStatus(e);
  if(s==='live')return' <span class="live-badge"><span class="live-dot"></span>Live</span>';
  if(s==='past')return' <span class="ended-badge">Ended</span>';
  // upcoming — compute time until start
  const now=new Date();
  function toMin(raw){if(!raw||!raw.trim())return null;const s=raw.trim().padStart(4,'0');return parseInt(s.slice(0,s.length-2),10)*60+parseInt(s.slice(-2),10);}
  const startMin=toMin(e.startRaw);
  if(startMin===null)return'';
  const eventStart=new Date(e.date);eventStart.setHours(Math.floor(startMin/60),startMin%60,0,0);
  const diffMs=eventStart-now;
  if(diffMs<0)return'';
  const diffMin=Math.round(diffMs/60000);
  let label;
  if(diffMin<60)label=diffMin+'m';
  else if(diffMin<60*24){const h=Math.round(diffMin/60);label=h+'h';}
  else{const d=Math.round(diffMin/1440);if(d<=7)label=d+'d';else label='Later';}
  return' <span class="starts-in">'+label+'</span>';
}

/* ── Map view ── */
let leafletMap=null;

function renderMap(filtered,listing){
  // clean up previous map instance
  if(leafletMap){try{leafletMap.remove();}catch(e){}leafletMap=null;}
  listing.innerHTML='<div id="map-container"></div>';
  leafletMap=L.map('map-container').setView([42.33,-122.87],11);
  setTimeout(()=>{if(leafletMap)leafletMap.invalidateSize();},100);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom:19
  }).addTo(leafletMap);

  // group events by venue
  const byVenue={};
  filtered.forEach(e=>{
    const key=e.venue||'Unknown';
    if(!byVenue[key])byVenue[key]={events:[],city:e.city,address:e.venueAddress};
    byVenue[key].events.push(e);
  });

  // load geocache
  let geocache={};
  try{geocache=JSON.parse(localStorage.getItem('rvlm_geocache')||'{}');}catch(e){}

  const venueNames=Object.keys(byVenue);
  const toGeocode=[];
  const cached=[];

  venueNames.forEach(name=>{
    const cacheKey=name+','+(byVenue[name].city||'')+',OR';
    if(geocache[cacheKey]){
      cached.push({name,coords:geocache[cacheKey],cacheKey});
    }else{
      toGeocode.push({name,cacheKey,city:byVenue[name].city,address:byVenue[name].address});
    }
  });

  // add cached markers immediately
  const map=leafletMap;
  cached.forEach(item=>{
    if(!map)return;
    addVenueMarker(map,item.coords,item.name,byVenue[item.name].events);
  });

  // geocode remaining venues with rate limiting (1 per second)
  async function geocodeAll(){
    for(let i=0;i<toGeocode.length;i++){
      if(!leafletMap||leafletMap!==map)return; // map was removed
      const item=toGeocode[i];
      const q=item.address?item.address+','+item.city+',OR':item.name+','+item.city+',OR';
      try{
        const res=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q));
        const data=await res.json();
        if(data&&data.length>0){
          const coords=[parseFloat(data[0].lat),parseFloat(data[0].lon)];
          geocache[item.cacheKey]=coords;
          try{localStorage.setItem('rvlm_geocache',JSON.stringify(geocache));}catch(e){}
          if(leafletMap===map){
            addVenueMarker(map,coords,item.name,byVenue[item.name].events);
          }
        }
      }catch(e){/* silently skip */}
      // rate limit: wait 1 second between requests
      if(i<toGeocode.length-1){
        await new Promise(r=>setTimeout(r,1000));
      }
    }
  }
  if(toGeocode.length>0)geocodeAll();
}

function addVenueMarker(map,coords,venueName,events){
  let popupHtml='<div class="map-popup-venue">'+esc(venueName)+'</div>';
  events.forEach(e=>{
    const tS=parseTime(e.startRaw);
    const t=e.eventType.toLowerCase();
    const bc=t==='jam'?'jam':t==='open mic'?'openmic':t==='solo'?'solo':'';
    popupHtml+='<div class="map-popup-show">';
    popupHtml+='<span class="map-popup-artist">'+esc(e.musician)+'</span>';
    popupHtml+='<span class="map-popup-badge '+bc+'">'+esc(e.eventType)+'</span>';
    popupHtml+='<div class="map-popup-time">'+esc(tS)+'</div>';
    popupHtml+='</div>';
  });
  L.marker(coords).addTo(map).bindPopup(popupHtml,{maxWidth:280});
}

function renderCalendar(filtered,listing){
  // build map of dateStr -> events
  const byDay={};
  filtered.forEach(e=>{if(!byDay[e.dateStr])byDay[e.dateStr]=[];byDay[e.dateStr].push(e);});
  // determine all days in the range
  const days=[];
  let d=new Date(rangeStart);
  while(d<=rangeEnd){days.push(fmtISO(d));d=addDays(d,1);}
  const todayStr=fmtISO(midnight(new Date()));
  // pick selected date: prefer current selection if still valid, else today, else first day with events
  if(!calSelectedDate||!days.includes(calSelectedDate)){
    if(days.includes(todayStr)&&byDay[todayStr])calSelectedDate=todayStr;
    else calSelectedDate=days.find(ds=>byDay[ds])||days[0]||todayStr;
  }
  // build strip
  const stripHtml=days.map(ds=>{
    const dt=new Date(ds+'T12:00:00');
    const abbr=dt.toLocaleDateString('en-US',{weekday:'short'});
    const num=dt.getDate();
    const count=(byDay[ds]||[]).length;
    const cls=['cal-day'];
    if(ds===todayStr)cls.push('today');
    if(ds===calSelectedDate)cls.push('active');
    if(!count)cls.push('empty');
    return `<button class="${cls.join(' ')}" onclick="selectCalDay('${ds}')">${esc(abbr)}<strong>${num}</strong>${count?'<span class="cal-day-count">('+count+')</span>':''}</button>`;
  }).join('');
  // build selected day's events
  const selEvts=byDay[calSelectedDate]||[];
  const selDate=new Date(calSelectedDate+'T12:00:00');
  const dayTitle=dayLabel(selDate);
  let eventsHtml='';
  if(selEvts.length){
    const buckets={};
    selEvts.forEach(e=>{const b=timeBucket(e.startRaw);if(!buckets[b])buckets[b]=[];buckets[b].push(e);});
    eventsHtml=BUCKETS.filter(k=>buckets[k]).map(k=>`
      <section class="time-block">
        <div class="time-block-header">${esc(k)}<span class="time-range-hint">${BUCKET_HINTS[k]||''}</span></div>
        <div class="card-grid">${buckets[k].map(e=>cardHtml(e,e._idx)).join('')}</div>
      </section>`).join('');
  }else{
    eventsHtml='<div class="state-msg">No shows on this day</div>';
  }
  listing.innerHTML=`<div class="cal-strip">${stripHtml}</div>
    <div class="day-header" style="cursor:default;margin-bottom:8px;">
      <div class="day-header-left"><span>${esc(dayTitle)}</span>${calSelectedDate===todayStr?'<span class="day-today-marker">Today</span>':''}<span class="day-count">${selEvts.length} show${selEvts.length!==1?'s':''}</span></div>
    </div>${eventsHtml}`;
  // scroll active day into view in strip
  requestAnimationFrame(()=>{
    const activeBtn=listing.querySelector('.cal-day.active');
    if(activeBtn)activeBtn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  });
}

/* ── Modal focus trap ── */
document.getElementById('modal').addEventListener('keydown',function(e){
  if(e.key!=='Tab')return;
  const focusable=this.querySelectorAll('button,a[href],input,[tabindex]:not([tabindex="-1"])');
  if(!focusable.length)return;
  const first=focusable[0],last=focusable[focusable.length-1];
  if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
  else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
});

/* ── URL state ── */
function syncUrl(){
  const p=new URLSearchParams();
  // detect which quick chip is active
  const activeChip=document.querySelector('.nav-chip.active');
  if(activeChip){
    const q=activeChip.id.replace('chip-','');
    p.set('range',q);
  }else{
    p.set('from',fmtISO(rangeStart));
    p.set('to',fmtISO(rangeEnd));
  }
  if(activeRegion!=='all')p.set('region',activeRegion);
  if(activeType!=='all')p.set('type',activeType);
  if(activeGenre!=='all')p.set('genre',activeGenre);
  if(activeVenueType!=='all')p.set('venue',activeVenueType);
  const q=document.getElementById('search').value;
  if(q)p.set('q',q);
  if(viewMode!=='card')p.set('view',viewMode);
  const str=p.toString();
  history.replaceState(null,'',str?'?'+str:location.pathname);
}

function restoreFromUrl(){
  const p=new URLSearchParams(location.search);
  // date range
  if(p.has('range')){
    const r=p.get('range');
    const chip=document.getElementById('chip-'+r);
    if(chip)applyQuick(chip,r);
    const labels={today:'Today',tomorrow:'Tomorrow',weekend:'Weekend',week:'This week',next7:'Next 7 days',month:'This month'};
    const dpill=document.getElementById('pill-date');
    document.getElementById('pill-date-label').textContent=labels[r]||r;
    if(dpill)dpill.classList.toggle('filtered',r!=='today');
    document.querySelectorAll('#pill-date-menu .pill-option').forEach(o=>{o.classList.toggle('selected',o.textContent===labels[r]);});
  }else if(p.has('from')){
    rangeStart=midnight(new Date(p.get('from')+'T12:00:00'));
    rangeEnd=p.has('to')?midnight(new Date(p.get('to')+'T12:00:00')):rangeStart;
    clearQuickChips();updateDpLabel();
  }
  // region
  if(p.has('region')){
    activeRegion=p.get('region');
    FILTER_STATE.region=activeRegion;
    syncPillUi('region',activeRegion);
  }
  // type
  if(p.has('type')){
    activeType=p.get('type');
    FILTER_STATE.type=activeType;
    syncPillUi('type',activeType);
  }
  // genre, venue type (pill UI synced after data loads in populateFilterDropdowns)
  if(p.has('genre')){activeGenre=p.get('genre');FILTER_STATE.genre=activeGenre;}
  if(p.has('venue')){activeVenueType=p.get('venue');FILTER_STATE.venue=activeVenueType;}
  // search
  if(p.has('q')){
    const box=document.getElementById('search');
    box.value=p.get('q');
    box.classList.add('open');
    document.getElementById('search-btn').classList.add('open');
  }
  // view
  if(p.get('view')==='row')setView('row');
  else if(p.get('view')==='calendar')setView('calendar');
  else if(p.get('view')==='map')setView('map');
  updateClearBtn();
}

/* ── Add to calendar (.ics) ── */
function padIcs(n){return String(n).padStart(2,'0');}
function icsDate(date,timeRaw){
  const y=date.getFullYear(),mo=date.getMonth()+1,d=date.getDate();
  if(!timeRaw||!timeRaw.trim()){
    return y+padIcs(mo)+padIcs(d);
  }
  const s=timeRaw.trim().padStart(4,'0');
  const h=parseInt(s.slice(0,s.length-2),10),m=s.slice(-2);
  return y+padIcs(mo)+padIcs(d)+'T'+padIcs(h)+padIcs(m)+'00';
}
function makeIcs(e){
  const dtStart=icsDate(e.date,e.startRaw);
  let dtEnd;
  if(e.endRaw&&e.endRaw.trim()){
    dtEnd=icsDate(e.date,e.endRaw);
  }else{
    // default 2 hours later
    const s=e.startRaw?e.startRaw.trim().padStart(4,'0'):'2000';
    let h=parseInt(s.slice(0,s.length-2),10)+2,m=s.slice(-2);
    dtEnd=e.date.getFullYear()+padIcs(e.date.getMonth()+1)+padIcs(e.date.getDate())+'T'+padIcs(h)+padIcs(m)+'00';
  }
  const loc=e.venue+(e.city?', '+e.city+', OR':'');
  return['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//RogueLive//EN','BEGIN:VEVENT',
    'DTSTART:'+dtStart,'DTEND:'+dtEnd,
    'SUMMARY:'+e.musician+' at '+e.venue,
    'LOCATION:'+loc,
    'DESCRIPTION:'+(e.genre?e.genre+'. ':'')+(e.notes||e.eventType),
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
}
function downloadIcs(idx){
  const e=allEvents[idx];if(!e)return;
  const blob=new Blob([makeIcs(e)],{type:'text/calendar'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(e.musician+'-'+e.venue).replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.ics';
  a.click();
  URL.revokeObjectURL(a.href);
}

  if(navigator.share){
    navigator.share({title:e.musician+' at '+e.venue,url:url}).catch(()=>{});
  }else{
    navigator.clipboard.writeText(url).then(()=>{
      const btn=document.getElementById('share-btn');
      if(btn){btn.textContent='Copied!';setTimeout(()=>{btn.innerHTML='<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>Share';},1500);}
    });
  }
}

/* swipe-to-dismiss on bottom sheet header */
(function(){
  const header=document.getElementById('bs-header');
  const panel=document.getElementById('bs-panel');
  let startY=0,currentY=0,dragging=false;
  header.addEventListener('touchstart',function(e){
    startY=e.touches[0].clientY;currentY=startY;dragging=true;
    panel.style.transition='none';
  },{passive:true});
  header.addEventListener('touchmove',function(e){
    if(!dragging)return;
    currentY=e.touches[0].clientY;
    const dy=Math.max(0,currentY-startY);
    panel.style.transform='translateY('+dy+'px)';
  },{passive:true});
  header.addEventListener('touchend',function(){
    if(!dragging)return;
    dragging=false;
    panel.style.transition='';
    const dy=currentY-startY;
    if(dy>60){closeBottomSheet();}
    else{panel.style.transform='';}
  });
})();

/* ── Floating day pill (multi-day views) ── */
let _dayBadgeObserver=null,_dayBadgeScroll=null,_dayBadgeActive=false;
function setupNextDayBadge(){
  const fab=document.getElementById('next-day-fab');
  const label=document.getElementById('next-day-label');
  if(!fab)return;
  if(_dayBadgeObserver){_dayBadgeObserver.disconnect();_dayBadgeObserver=null;}
  if(_dayBadgeScroll){window.removeEventListener('scroll',_dayBadgeScroll);_dayBadgeScroll=null;}
  _dayBadgeActive=false;
  const sections=[...document.querySelectorAll('.day-section')];
  if(sections.length<2){fab.classList.remove('visible');return;}
  const todayStr=fmtISO(midnight(new Date()));
  let currentIdx=0;
  function updateLabel(){
    const ds=sections[currentIdx].dataset.date;
    const d=new Date(ds+'T12:00:00');
    const dayText=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    label.textContent=ds===todayStr?dayText+' (Today)':dayText;
  }
  // track which day section is visible
  _dayBadgeObserver=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.isIntersecting){
        const idx=sections.indexOf(en.target);
        if(idx>=0){currentIdx=idx;updateLabel();}
      }
    });
  },{rootMargin:'-120px 0px -60% 0px',threshold:0});
  sections.forEach(s=>_dayBadgeObserver.observe(s));
  updateLabel();
  _dayBadgeActive=true;
  // show/hide based on scroll: visible when scrolled down, hidden at top
  const showThreshold=200;
  _dayBadgeScroll=()=>{
    if(!_dayBadgeActive)return;
    fab.classList.toggle('visible',window.scrollY>showThreshold);
  };
  window.addEventListener('scroll',_dayBadgeScroll,{passive:true});
  _dayBadgeScroll();
}
function scrollToNextDay(){
  const sections=[...document.querySelectorAll('.day-section')];
  const scrollY=window.scrollY+180;
  const next=sections.find(s=>s.offsetTop>scrollY);
  if(next){next.scrollIntoView({behavior:'smooth',block:'start'});
    setTimeout(()=>window.scrollBy(0,-120),400);
  }
}
