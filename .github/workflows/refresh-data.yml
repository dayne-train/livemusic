name: Refresh music data

# Refreshes both the volunteer musiclist.txt snapshot and the merged
# events.json that the site reads. Best-effort: a failing source does
# not block the others. Commits only when content actually changed.

on:
  schedule:
    - cron: '15 */4 * * *'   # every 4 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh musiclist.txt snapshot (best effort)
        id: fetch
        continue-on-error: true
        run: |
          set -uo pipefail
          mkdir -p data
          TMP="$(mktemp)"

          # Upstream has an expired self-signed cert and a WAF that blocks
          # datacenter UAs, so we try a few fetcher fingerprints in order.
          UA='Mozilla/5.0 (X11; Linux x86_64; rv:128.0) Gecko/20100101 Firefox/128.0'
          HDRS=(
            -H "User-Agent: $UA"
            -H "Accept: text/plain,text/html;q=0.9,*/*;q=0.8"
            -H "Accept-Language: en-US,en;q=0.9"
            -H "Accept-Encoding: gzip, deflate, br"
          )

          try_curl() {
            local url="$1" extra="${2:-}"
            curl -fsSL -k --compressed \
              --retry 2 --retry-delay 4 --max-time 45 \
              "${HDRS[@]}" $extra "$url" -o "$TMP"
          }
          try_wget() {
            local url="$1"
            wget --quiet --no-check-certificate --tries=2 --timeout=45 \
              --user-agent="$UA" \
              --header="Accept: text/plain,text/html;q=0.9,*/*;q=0.8" \
              --header="Accept-Language: en-US,en;q=0.9" \
              -O "$TMP" "$url"
          }

          URL_HTTPS="https://roguevalleylivemusicnightlife.com/musiclist.txt"
          URL_HTTP="http://roguevalleylivemusicnightlife.com/musiclist.txt"
          OK=""
          for attempt in \
            "curl-https-h2:try_curl $URL_HTTPS" \
            "curl-https-h1:try_curl $URL_HTTPS --http1.1" \
            "curl-http:    try_curl $URL_HTTP" \
            "wget-https:   try_wget $URL_HTTPS" \
            "wget-http:    try_wget $URL_HTTP" ; do
            LABEL="${attempt%%:*}"
            CMD="${attempt#*:}"
            echo "::group::Attempt $LABEL"
            if eval "$CMD" ; then echo "OK ($LABEL)"; OK="$LABEL"; echo "::endgroup::"; break ; fi
            echo "failed"
            echo "::endgroup::"
          done

          if [ -z "$OK" ]; then
            echo "::warning::All txt fetchers failed. Keeping prior snapshot. Pipeline will continue with other sources."
            exit 0
          fi
          echo "fetch_strategy=$OK" >> "$GITHUB_OUTPUT"

          BYTES="$(wc -c < "$TMP" | tr -d ' ')"
          if [ "$BYTES" -lt 1000 ]; then
            echo "::warning::Fetched txt too small ($BYTES bytes). Keeping prior snapshot."
            exit 0
          fi
          if ! grep -q '^--events' "$TMP" \
             || ! grep -q '^--musicians' "$TMP" \
             || ! grep -q '^--venues' "$TMP"; then
            echo "::warning::Fetched txt missing expected section markers. Keeping prior snapshot."
            exit 0
          fi
          if grep -qi 'One moment, please' "$TMP"; then
            echo "::warning::Got a bot-challenge page instead of data. Keeping prior snapshot."
            exit 0
          fi

          mv "$TMP" data/musiclist.txt
          echo "Snapshot OK: $BYTES bytes"

      - name: Run ingest pipeline
        id: pipeline
        run: |
          set -euo pipefail
          cd ingest
          node merge.mjs
          cd ..
          # Sanity check: pipeline must produce a reasonable number of events.
          EVENT_COUNT=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("data/events.json")).events.length)')
          echo "event_count=$EVENT_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$EVENT_COUNT" -lt 50 ]; then
            echo "::error::Event count suspiciously low ($EVENT_COUNT). Refusing to commit."
            exit 1
          fi
          echo "Pipeline produced $EVENT_COUNT events."

      - name: Commit if content changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_HASH=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("data/events.json")).content_hash)')
          OLD_HASH=$(git show HEAD:data/events.json 2>/dev/null | node -e 'try{let s="";process.stdin.on("data",c=>s+=c);process.stdin.on("end",()=>{try{console.log(JSON.parse(s).content_hash||"")}catch(e){console.log("")}})}' || echo "")

          if [ "$NEW_HASH" = "$OLD_HASH" ] && [ -n "$NEW_HASH" ]; then
            echo "Content hash unchanged ($NEW_HASH). Nothing to commit."
            exit 0
          fi

          git add data/musiclist.txt data/events.json data/meta.json
          if git diff --cached --quiet; then
            echo "Nothing staged. Skipping commit."
            exit 0
          fi
          git commit -m "Refresh event data ($NEW_HASH)"
          git push
