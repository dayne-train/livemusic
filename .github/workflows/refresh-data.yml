name: Refresh music data snapshot

# Fetches the upstream music list server-side (where we can tolerate the
# source's expired self-signed TLS cert), validates it, and commits a
# same-origin snapshot the site can fall back to when the live proxies fail.

on:
  schedule:
    - cron: '0 14 * * *'   # daily ~06:00 America/Los_Angeles (14:00 UTC)
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch + validate snapshot
        id: fetch
        run: |
          set -uo pipefail
          mkdir -p data
          TMP="$(mktemp)"

          # The source has two problems we need to work around server-side:
          #  - expired self-signed TLS cert (so we disable trust verification)
          #  - WAF that returns HTTP 415 to bot-ish requests from datacenter IPs
          # We try several fetchers with different TCP/TLS fingerprints and a
          # browser-like header set. First one to land valid bytes wins.
          UA='Mozilla/5.0 (X11; Linux x86_64; rv:128.0) Gecko/20100101 Firefox/128.0'
          HDRS=(
            -H "User-Agent: $UA"
            -H "Accept: text/plain,text/html;q=0.9,*/*;q=0.8"
            -H "Accept-Language: en-US,en;q=0.9"
            -H "Accept-Encoding: gzip, deflate, br"
          )

          try_curl() {
            local url="$1" extra="${2:-}"
            curl -fsSL -k --compressed \
              --retry 2 --retry-delay 4 --max-time 45 \
              "${HDRS[@]}" $extra "$url" -o "$TMP"
          }
          try_wget() {
            local url="$1"
            wget --quiet --no-check-certificate --tries=2 --timeout=45 \
              --user-agent="$UA" \
              --header="Accept: text/plain,text/html;q=0.9,*/*;q=0.8" \
              --header="Accept-Language: en-US,en;q=0.9" \
              -O "$TMP" "$url"
          }

          URL_HTTPS="https://roguevalleylivemusicnightlife.com/musiclist.txt"
          URL_HTTP="http://roguevalleylivemusicnightlife.com/musiclist.txt"
          OK=""
          for attempt in \
            "curl-https-h2:try_curl $URL_HTTPS" \
            "curl-https-h1:try_curl $URL_HTTPS --http1.1" \
            "curl-http:    try_curl $URL_HTTP" \
            "wget-https:   try_wget $URL_HTTPS" \
            "wget-http:    try_wget $URL_HTTP" ; do
            LABEL="${attempt%%:*}"
            CMD="${attempt#*:}"
            echo "::group::Attempt $LABEL"
            if eval "$CMD" ; then echo "OK ($LABEL)"; OK="$LABEL"; echo "::endgroup::"; break ; fi
            echo "failed"
            echo "::endgroup::"
          done

          if [ -z "$OK" ]; then
            echo "::error::All fetchers failed — keeping last good snapshot"
            exit 1
          fi
          echo "fetch_strategy=$OK" >> "$GITHUB_OUTPUT"

          set -e  # re-enable fail-fast for validation / write steps below

          # Validate: non-trivial size and the expected section markers must
          # be present, otherwise we keep the last known-good snapshot.
          BYTES="$(wc -c < "$TMP" | tr -d ' ')"
          if [ "$BYTES" -lt 1000 ]; then
            echo "::error::Fetched file too small ($BYTES bytes) — keeping last good snapshot"
            exit 1
          fi
          for marker in -- '--events' '--musicians' '--venues'; do :; done
          if ! grep -q '^--events' "$TMP" \
             || ! grep -q '^--musicians' "$TMP" \
             || ! grep -q '^--venues' "$TMP"; then
            echo "::error::Fetched file missing expected section markers — keeping last good snapshot"
            exit 1
          fi
          # Reject the codetabs/CDN "One moment, please..." bot-challenge page.
          if grep -qi 'One moment, please' "$TMP"; then
            echo "::error::Got a bot-challenge page instead of data — keeping last good snapshot"
            exit 1
          fi

          # Source's own timestamp lives on the line after the --timestamp marker.
          SRC_TS="$(awk '/^--timestamp/{getline; print; exit}' "$TMP" | tr -d '\r')"

          mv "$TMP" data/musiclist.txt
          printf '{\n  "fetched_at": "%s",\n  "source_timestamp": "%s",\n  "bytes": %s\n}\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${SRC_TS:-unknown}" "$BYTES" > data/meta.json

          echo "Snapshot OK: $BYTES bytes, source timestamp: ${SRC_TS:-unknown}"

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/musiclist.txt data/meta.json
          # data/meta.json changes every run (fetched_at); only commit when the
          # actual music list changed, then refresh meta alongside it.
          if git diff --cached --quiet -- data/musiclist.txt; then
            echo "No change in music list — skipping commit."
            git reset -q
          else
            git commit -m "Refresh music data snapshot"
            git push
          fi
